<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio | Home</title>
    <style>
        /* CSS Variables for easy color changes */
        :root {
            --bg-dark: #0f0c29;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --accent-purple: #892cdc;
            --accent-blue: #00d2ff;
            --text-light: #f5f5f5;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-light);
            font-weight: 500;
            transition: 0.3s;
            opacity: 0.8;
        }

        nav ul li a:hover {
            opacity: 1;
            color: var(--accent-blue);
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 3rem;
            color: #ccc;
            max-width: 600px;
        }

        /* Split Cards */
        .choices {
            display: flex;
            gap: 2rem;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            flex: 1;
            background: var(--glass);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            color: white;
            transition: transform 0.4s, border 0.4s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-10px);
            border: 1px solid var(--accent-purple);
            background: rgba(255, 255, 255, 0.15);
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .card span {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-blue);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .choices { flex-direction: column; }
            nav ul { display: none; } /* Simplified for mobile */
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">STUDIO.NAME</div>
        <ul>
            <li><a href="index.html" style="color: var(--accent-blue);">Home</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="design.html">Design</a></li>
            <li><a href="contact.html">Contact</a></li>
            <a href="niche-twin.html">I Remember Him Twin</a>
        </ul>
    </nav>

    <main class="hero">
        <h1>Visual Storytelling <br> Through a Creative Lens</h1>
        <p>A fusion of cinematic photography and modern graphic design crafted with a deep blue and purple soul.</p>

        <div class="choices">
            <a href="photography.html" class="card">
                <span>The Gallery</span>
                <h2>Photography</h2>
            </a>
            <a href="design.html" class="card">
                <span>The Studio</span>
                <h2>Design</h2>
            </a>
        </div>
    </main>

</body>
</html>

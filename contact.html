<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Studio</title>
    <style>
        :root {
            --bg-dark: #0f0c29;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --accent-purple: #892cdc;
            --accent-blue: #00d2ff;
            --text-light: #f5f5f5;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        nav ul { display: flex; list-style: none; }
        nav ul li { margin-left: 30px; }
        nav ul li a {
            text-decoration: none;
            color: var(--text-light);
            opacity: 0.7;
            transition: 0.3s;
        }
        nav ul li a:hover, nav ul li a.active { opacity: 1; color: var(--accent-blue); }

        /* Contact Section */
        .contact-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 5%;
        }

        .contact-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 30px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        form { display: flex; flex-direction: column; gap: 20px; }

        input, textarea {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            outline: none;
        }

        input:focus, textarea:focus { border-color: var(--accent-purple); }

        button {
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-blue));
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: transform 0.3s;
        }

        button:hover { transform: scale(1.02); }

        @media (max-width: 600px) { nav ul { display: none; } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">STUDIO.NAME</a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="design.html">Design</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main class="contact-container">
        <div class="contact-card">
            <h1>Let's Connect</h1>
            <p style="margin-bottom: 30px; color: var(--accent-blue);">Direct to: 29alookabaugh@ggusd.net</p>
            
            <form action="https://formspree.io/f/29alookabaugh@ggusd.net" method="POST">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="_replyto" placeholder="Your Email" required>
                <textarea name="message" rows="5" placeholder="Tell me about your project..." required></textarea>
                
                <input type="hidden" name="_subject" value="New Website Inquiry!">
                
                <button type="submit">Send Message</button>
            </form>
        </div>
    </main>

</body>
</html>
